name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run release:check
      - id: package
        run: echo "file=$(npm pack --silent)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v6
        with:
          name: npm-package
          path: ${{ steps.package.outputs.file }}
      - if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" "${{ steps.package.outputs.file }}" --generate-notes --verify-tag
